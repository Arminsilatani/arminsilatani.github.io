<!-- ::::::::::::::::::::::::::::::::::::::: PAGE SCRIPT ::::::::::::::::::::::::::::::::::::::: -->
<script>

document.addEventListener("DOMContentLoaded", () => {

    /* ------------------------------------------------------------------
    TIMELINE DATA
    --------------------------------------------------------------------- */

    const timelineData = {

        1989:{context:"Krankenhaus Kasra",title:"Der Anfang des Lebens",text:"Ich wurde am 21. März 1989 in Teheran, Iran, geboren. Natürlich ahnte ich damals nicht, dass Computer und das Internet einmal einen großen Teil meines Lebens bestimmen würden. Ich war einfach ein Kind, das Jahre später eine Tastatur entdecken sollte – und stundenlang über die kleinen Tasten nachdenken würde."},

        2003:{context:"Mein erster Computer",title:"Die erste echte Neugier",text:"Im zweiten Jahr der Mittelschule, mit vierzehn, kaufte ich meinen ersten Computer. Für viele war es einfach nur ein Gerät. Für mich war es mehr. Nach und nach begann ich, damit zu arbeiten, Dinge auszuprobieren und zu verstehen, welche Welt sich hinter diesem Bildschirm und seinen Tasten verbirgt."},

        2012:{context:"Migration",title:"Der Schritt nach Europa",text:"2012 verließ ich den Iran. Damals wusste ich noch nicht genau, wohin mich dieser Schritt führen würde. Aber ich spürte, dass diese Reise mehr sein würde als nur ein kurzer Abschnitt meines Lebens. Wahrscheinlich würde sie viele Jahre prägen."},

        2013:{context:"Rom, Italien",title:"Kunst, Architektur und Struktur",text:"Rom war die erste Stadt, in der ich lebte. An der Università Guglielmo Marconi studierte ich IT, doch ein großer Teil meiner Zeit gehörte der Arbeit. Ich arbeitete als Tourguide und war in vielen Teilen Italiens unterwegs. Dadurch lernte ich verschiedene Städte und Menschen kennen. Rom war für mich nie nur ein Wohnort – jede Straße schien ihre eigene Geschichte zu haben."},

        2015:{context:"Kopenhagen, Dänemark",title:"Der skandinavische Winter",text:"Einige Monate lebte ich auch in Kopenhagen. Ich wollte dort meine Arbeit aufbauen und bleiben können. Am Ende bekam ich jedoch keine Aufenthaltserlaubnis. Es war keine leichte Zeit, aber dort verstand ich, dass Pläne nicht immer so verlaufen, wie man sie sich vorstellt."},

        2016:{context:"Aachen, Deutschland",title:"Ordnung und Präzision",text:"Eine Zeit lang lebte ich in Aachen. In Deutschland fiel mir eine Sache besonders auf: Ordnung. Im Alltag der Menschen, in ihrer Arbeitsweise und sogar in kleinen Details. Diese Erfahrung beeinflusste später stark meine Sicht auf Arbeit, Projekte und Struktur."},

        2017:{context:"Genua, Italien",title:"Restaurant Soraya",text:"In Genua eröffnete ich ein iranisches Restaurant namens Soraya. Es war eine spannende Erfahrung, doch am Ende lief es nicht wie geplant und ich verlor einen großen Teil meines Kapitals. Trotzdem lernte ich in dieser Zeit viel über Entscheidungen, Risiko und Geschäftsführung."},

        2018:{context:"Rückkehr in den Iran",title:"Bei meiner Familie",text:"Nach dem Tod meines Vaters entschied ich mich, in den Iran zurückzukehren, um bei meiner Mutter zu sein. Manche Entscheidungen brauchen keine langen Erklärungen. Man merkt einfach, dass der Moment gekommen ist, den eigenen Weg zu ändern."},

        2019:{context:"Der Einstieg in SEO",title:"Projekt Ermaghan Registrierung",text:"2019 machte mir ein Freund einen Vorschlag, der meinen beruflichen Weg komplett veränderte. Er fragte, ob ich die Website und das SEO seines Unternehmens übernehmen könnte. Damals wusste ich kaum, was Suchmaschinenoptimierung genau bedeutet. Trotzdem sagte ich zu und begann zu lernen. Das Projekt hieß Ermaghan Registrierung."},

        2020:{context:"Intensive Lernphase",title:"Tägliche Arbeit",text:"SEO zog mich sofort in seinen Bann. Ich arbeitete von morgens bis abends, und oft dachte ich nachts schon an den nächsten Tag. Ich las Artikel, testete Strategien, analysierte Websites und machte Fehler, die mich vorangebracht haben. So wurde SEO Schritt für Schritt mein beruflicher Fokus."},

        2021:{context:"Rascht, Iran",title:"Die Zeit der Pandemie",text:"Als die Pandemie begann, verließ ich Teheran für eine Weile und zog nach Rascht – eine Stadt, die für mich immer eine besondere Ruhe hatte. Klima, Natur und Atmosphäre halfen mir, diese schwierige Phase gelassener zu überstehen und gleichzeitig konzentriert weiterzuarbeiten."},

        2022:{context:"Professionellere Arbeit",title:"Mehr Projekte",text:"Mit der Zeit kamen mehr Aufträge dazu. Jede Website brachte eine neue Aufgabe: Analyse, Content‑Strategie, technische Struktur. Genau diese Vielfalt machte SEO für mich zu einem Beruf, in dem man nie auslernt."},

        2023:{context:"Beruflicher Weg",title:"Fokus auf echtes Wachstum",text:"Nach und nach entschied ich, vor allem mit Unternehmen zu arbeiten, die echtes und nachhaltiges Wachstum anstreben – nicht kurzfristige Änderungen. Wenn Strategie und Struktur stimmen, kommen Ergebnisse ganz von selbst."},

        2026:{context:"Teheran, Iran",title:"In Zeiten des Krieges",text:"Derzeit lebe ich in Teheran. Durch die aktuelle Kriegssituation und die wiederkehrenden Internetausfälle stehen viele Online‑Projekte still. Diese unerwartete Pause nutzte ich jedoch, um etwas umzusetzen, das lange in meinem Kopf war: meine persönliche Website vollständig neu aufzubauen und von WordPress auf reines HTML umzustellen – für mehr Geschwindigkeit, klare Struktur und vollständige Kontrolle. Wie so oft wurde auch diese Zwangspause zu einer Chance, etwas Neues zu schaffen."}

    };

    /* ------------------------------------------------------------------
    BUILD TIMELINE HTML
    --------------------------------------------------------------------- */

    const container = document.getElementById("timeline-container");

    Object.keys(timelineData).forEach(year => {

        const data = timelineData[year];

        const block = document.createElement("div");
        block.className = "story-block";

        block.innerHTML = `
            <div class="content-date">
                <div class="step-year">${year}</div>
            </div>
            <div class="content-text">
                <span class="step-context">${data.context || ""}</span>
                <h2 class="step-title">${data.title}</h2>
                <p class="step-text">${data.text}</p>
            </div>
        `;

        container.appendChild(block);

    });



    /* ------------------------------------------------------------------
    SCROLL ANIMATION
    --------------------------------------------------------------------- */

    const storyBlocks = document.querySelectorAll(".story-block");

    function updateScrollAnimation(){

        const windowCenter = window.innerHeight / 2;
        const maxDistance = window.innerHeight / 2;

        storyBlocks.forEach(block => {

            const rect = block.getBoundingClientRect();
            const blockCenter = rect.top + (rect.height / 2);
            const distanceFromCenter = Math.abs(windowCenter - blockCenter);

            let progress = 1 - (distanceFromCenter / maxDistance);
            progress = Math.max(0, Math.min(1, progress));

            const textContent = block.querySelector(".content-text");
            if(textContent){
                textContent.style.setProperty("--progress", progress);
            }

            const dateElement = block.querySelector(".step-year");
            if(dateElement){

                dateElement.style.setProperty("--progress", progress);

                const scrollOffset = (windowCenter - blockCenter) * 1.5;
                dateElement.style.setProperty("--date-scroll-offset", `${scrollOffset}px`);
            }

            if(progress > 0.85){
                block.classList.add("active");
            }else{
                block.classList.remove("active");
            }

        });

    }



    /* ------------------------------------------------------------------
    SCROLL PERFORMANCE OPTIMIZATION
    --------------------------------------------------------------------- */

    let isScrolling = false;

    window.addEventListener("scroll", () => {

        if(!isScrolling){

            window.requestAnimationFrame(() => {

                updateScrollAnimation();
                isScrolling = false;

            });

            isScrolling = true;
        }

    });


    /* ------------------------------------------------------------------
    INITIAL STATE
    --------------------------------------------------------------------- */

    updateScrollAnimation();

});
    /* ------------------------------------------------------------------
    BREADCRUMP SCRIPT
    --------------------------------------------------------------------- */
    </script>

    <script>

    document.addEventListener("DOMContentLoaded",function(){

    const container = document.getElementById("terminalPath");

    const domain = window.location.hostname;

    const parts = window.location.pathname.split("/").filter(Boolean);

    let paths = [];
    let fullPath = "";

    paths.push({
    name:domain,
    url:"/"
    });

    parts.forEach(part=>{
    fullPath += "/" + part;

    paths.push({
    name:part,
    url:fullPath
    });

    });

    let textIndex = 0;
    let charIndex = 0;

    function typeSegment(){

    if(textIndex >= paths.length) return;

    let segment = paths[textIndex];

    let link = document.createElement("a");
    link.href = segment.url;

    container.appendChild(link);

    function typeChar(){

    if(charIndex < segment.name.length){

    link.textContent += segment.name.charAt(charIndex);
    charIndex++;

    setTimeout(typeChar,40);

    }else{

    charIndex=0;
    textIndex++;

    if(textIndex < paths.length){

    container.appendChild(document.createTextNode("/"));
    }

    setTimeout(typeSegment,100);

    }

    }

    typeChar();

    }

    typeSegment();

    });

    </script>
