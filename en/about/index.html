    <script>
        document.addEventListener("DOMContentLoaded", () => {

            /* ------------------------------------------------------------------
               TIMELINE DATA
            --------------------------------------------------------------------- */
            const timelineData = {
                1989: {
                    context: "Kasra Hospital",
                    title: "Where It All Began",
                    text: "I was born on March 21, 1989, in Tehran at Kasra Hospital. Back then, of course, I had no idea that computers and the internet would become such a big part of my life. I was just a normal kid. A few years later, though, I’d find myself staring at a keyboard for hours, wondering what all those keys could do."
                },
                2003: {
                    context: "First Computer",
                    title: "Real Curiosity Begins",
                    text: "In 2003, when I was 14 and in middle school, I bought my first computer. For many people it was just another device, but for me it quickly became something more. I started exploring it, trying different things, and slowly discovering the world behind the screen and the keyboard."
                },
                2012: {
                    context: "Migration",
                    title: "Moving to Europe",
                    text: "In 2012, I left Iran. At the time I didn’t know exactly where the road would lead, but I knew this trip wouldn’t be short. It felt like the beginning of a chapter that could shape several years of my life."
                },
                2013: {
                    context: "Rome, Italy",
                    title: "Art, Architecture, and Structure",
                    text: "Rome was the first city where I lived after leaving Iran. I studied IT at Guglielmo Marconi University, although much of my time was spent working. I worked as a tour guide and traveled across many parts of Italy. That experience allowed me to see different cities and meet people from all over the world. Rome was never just a place to stay; every street seemed to carry its own story."
                },
                2015: {
                    context: "Copenhagen, Denmark",
                    title: "Scandinavian Winter",
                    text: "In 2015, I spent several months living in Copenhagen. My goal was to move forward with work and eventually stay there, but in the end I couldn’t secure residency. It wasn’t an easy experience, but it taught me that plans don’t always unfold the way we expect."
                },
                2016: {
                    context: "Aachen, Germany",
                    title: "Precision and Order",
                    text: "I also spent some time living in Aachen, Germany. What stood out most was the strong sense of order. You could see it in daily routines, in the way people worked, and even in small details of everyday life. That environment later shaped how I approach projects and work."
                },
                2017: {
                    context: "Genoa, Italy",
                    title: "Soraya Restaurant",
                    text: "In 2017, I opened an Iranian restaurant in Genoa called Soraya. It was an exciting experience, but it didn’t work out the way I had hoped, and I lost a large part of my investment. Still, that period taught me lessons about management and decision‑making that helped me later in my career."
                },
                2018: {
                    context: "Return to Iran",
                    title: "Close to Family",
                    text: "In 2018, after my father passed away, I decided to return to Iran to stay close to my mother. Some decisions don’t need long explanations. Sometimes you simply know it’s time for your direction to change."
                },
                2019: {
                    context: "Starting SEO",
                    title: "The Armaghan Corporate Project",
                    text: "In 2019, a friend made a suggestion that completely changed my career. He asked me to work on their website and SEO. At the time I didn’t even fully understand what SEO was, but I accepted and started learning. The project was called Armaghan Corporate, and it became my entry point into the field."
                },
                2020: {
                    context: "Serious Learning",
                    title: "Everyday Work",
                    text: "Once I stepped into SEO, I quickly became absorbed in it. I worked most of the day and often went to sleep thinking about what needed to be done the next day. I read articles, tested ideas, analyzed websites, and made plenty of mistakes. Over time, that routine turned into the core of my professional path."
                },
                2021: {
                    context: "Rasht, Iran",
                    title: "The Pandemic Period",
                    text: "When the pandemic began in 2021, I decided to spend some time away from Tehran and moved to Rasht. The city has always had a special feeling for me. Its climate, atmosphere, and nature made that difficult period easier and allowed me to focus more on my work."
                },
                2022: {
                    context: "Professional Growth",
                    title: "More Projects",
                    text: "Gradually, more projects started coming in. Every website brought a different challenge—sometimes technical SEO, sometimes content strategy, sometimes structural improvements. That variety is one of the reasons I enjoy this field so much."
                },
                2023: {
                    context: "Career Direction",
                    title: "Focus on Real Growth",
                    text: "Over time I found myself working mostly with businesses that were looking for real growth rather than quick, temporary changes. When the right strategy is implemented, results tend to follow."
                },
                2026: {
                    context: "Tehran, Iran",
                    title: "During the War",
                    text: "I currently live in Tehran. Because of the ongoing conflict between the United States, Israel, and Iran, along with frequent internet disruptions, many online activities have temporarily slowed down. I used this unexpected pause to rebuild my personal website—moving it from WordPress to pure HTML for a simpler structure, faster performance, and full control over the site. Like many moments in my career, it turned an interruption into a chance to build something new."
                }
            };

            /* ------------------------------------------------------------------
               BUILD TIMELINE HTML
            --------------------------------------------------------------------- */
            const container = document.getElementById("timeline-container");
            Object.keys(timelineData).forEach(year => {
                const data = timelineData[year];
                const block = document.createElement("div");
                block.className = "story-block";
                block.innerHTML = `
                    <div class="content-date">
                        <div class="step-year">${year}</div>
                    </div>
                    <div class="content-text">
                        <span class="step-context">${data.context || ""}</span>
                        <h2 class="step-title">${data.title}</h2>
                        <p class="step-text">${data.text}</p>
                    </div>
                `;
                container.appendChild(block);
            });

            /* ------------------------------------------------------------------
               SCROLL ANIMATION
            --------------------------------------------------------------------- */
            const storyBlocks = document.querySelectorAll(".story-block");

            function updateScrollAnimation() {
                const windowCenter = window.innerHeight / 2;
                const maxDistance = window.innerHeight / 2;

                storyBlocks.forEach(block => {
                    const rect = block.getBoundingClientRect();
                    const blockCenter = rect.top + (rect.height / 2);
                    const distanceFromCenter = Math.abs(windowCenter - blockCenter);
                    let progress = 1 - (distanceFromCenter / maxDistance);
                    progress = Math.max(0, Math.min(1, progress));

                    const textContent = block.querySelector(".content-text");
                    if (textContent) {
                        textContent.style.setProperty("--progress", progress);
                    }

                    const dateElement = block.querySelector(".step-year");
                    if (dateElement) {
                        dateElement.style.setProperty("--progress", progress);
                        const scrollOffset = (windowCenter - blockCenter) * 1.5;
                        dateElement.style.setProperty("--date-scroll-offset", `${scrollOffset}px`);
                    }

                    if (progress > 0.85) {
                        block.classList.add("active");
                    } else {
                        block.classList.remove("active");
                    }
                });
            }

            /* scroll performance optimization */
            let isScrolling = false;
            window.addEventListener("scroll", () => {
                if (!isScrolling) {
                    window.requestAnimationFrame(() => {
                        updateScrollAnimation();
                        isScrolling = false;
                    });
                    isScrolling = true;
                }
            });

            /* initial run */
            updateScrollAnimation();

            /* ------------------------------------------------------------------
               BREADCRUMB TYPING EFFECT
            --------------------------------------------------------------------- */
            const terminalPath = document.getElementById("terminalPath");
            if (terminalPath) {
                const domain = window.location.hostname;
                const parts = window.location.pathname.split("/").filter(Boolean);
                const paths = [{ name: domain, url: "/" }];

                let fullPath = "";
                parts.forEach(part => {
                    fullPath += "/" + part;
                    paths.push({ name: part, url: fullPath });
                });

                let textIndex = 0;
                let charIndex = 0;

                function typeSegment() {
                    if (textIndex >= paths.length) return;

                    const segment = paths[textIndex];
                    const link = document.createElement("a");
                    link.href = segment.url;
                    terminalPath.appendChild(link);

                    function typeChar() {
                        if (charIndex < segment.name.length) {
                            link.textContent += segment.name.charAt(charIndex);
                            charIndex++;
                            setTimeout(typeChar, 40);
                        } else {
                            charIndex = 0;
                            textIndex++;
                            if (textIndex < paths.length) {
                                terminalPath.appendChild(document.createTextNode("/"));
                            }
                            setTimeout(typeSegment, 100);
                        }
                    }

                    typeChar();
                }

                typeSegment();
            }

        });
    </script>
