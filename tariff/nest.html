<!-- ::::::::::::::::::::::::::::::::::::::: PRICING PAGE SCRIPT ::::::::::::::::::::::::::::::::::::::: -->

<script>

document.addEventListener("DOMContentLoaded", () => {

/* ==================================================
BREADCRUMB TERMINAL PATH
================================================== */

const container = document.getElementById("terminalPath");

if (container) {

const domain = window.location.hostname;
const parts = window.location.pathname.split("/").filter(Boolean);

let paths = [{ name: domain, url: "/" }];
let fullPath = "";

parts.forEach(part => {

fullPath += "/" + part;

paths.push({
name: part,
url: fullPath
});

});

let textIndex = 0;
let charIndex = 0;

function typeSegment(){

if(textIndex >= paths.length) return;

const segment = paths[textIndex];
const link = document.createElement("a");

link.href = segment.url;
container.appendChild(link);

function typeChar(){

if(charIndex < segment.name.length){

link.textContent += segment.name.charAt(charIndex);
charIndex++;

setTimeout(typeChar,40);

}else{

charIndex = 0;
textIndex++;

if(textIndex < paths.length){
container.appendChild(document.createTextNode("/"));
}

setTimeout(typeSegment,100);

}

}

typeChar();

}

typeSegment();

}

/* ==================================================
   SERVICE SYSTEM
================================================== */

const serviceSections = document.querySelectorAll(".service-section");

serviceSections.forEach(section => {

    const tabsContainer = section.querySelector(".pricing-tabs");
    const tabs = section.querySelectorAll(".pricing-tab");
    const packages = section.querySelectorAll(".package-tab");
    const serviceDot = section.querySelector(".service-dot");

    const items = section.querySelectorAll(".sub-services .sub-item");
    // [کد جدید]: انتخاب کادرهای گروهی
    const groupedBoxes = section.querySelectorAll(".grouped-services-box"); 

    let activeTab = "general";
    let activePackage = "simple";

    function fixLines() {
        const visible = [...items].filter(el => el.style.display !== "none");

        visible.forEach(el => el.style.borderBottom = "none");

        visible.forEach((el, i) => {
            if (i < visible.length - 1) {
                el.style.borderBottom = "1px dashed rgba(255,255,255,0.15)";
            }
        });
    }

    function updateServices() {
        // ۱. فیلتر کردن تک‌تک زیرآیتم‌ها
        items.forEach(item => {
            item.style.display =
                (item.dataset.tab === activeTab && item.dataset.package === activePackage)
                ? "flex"
                : "none";
        });

        // ۲. [کد جدید]: بررسی کادرهای گروهی برای رفع مشکل کادر خالی
        groupedBoxes.forEach(box => {
            // بررسی می‌کنیم که آیا درون این کادر، حداقل یک آیتم قابل نمایش وجود دارد؟
            const hasVisibleItems = Array.from(box.querySelectorAll('.sub-item'))
                                         .some(item => item.style.display !== "none");
            
            // اگر آیتم فعالی داشت کادر را نشان بده، در غیر این صورت کل کادر را محو کن
            box.style.display = hasVisibleItems ? "" : "none";
        });

        fixLines();
    }

    tabs.forEach(tab => {
        tab.addEventListener("click", () => {
            const target = tab.dataset.tab;

            tabs.forEach(t => t.classList.remove("active"));
            tab.classList.add("active");

            activeTab = target;

            section.style.setProperty(
                "--tab-color",
                target === "specialist" ? "#FFE76D" : "#4ECDC4"
            );

            if (serviceDot) {
                serviceDot.classList.remove("animate");
                void serviceDot.offsetWidth;
                serviceDot.classList.add("animate");
            }

            tab.classList.add("moving");

            setTimeout(() => {
                tabsContainer?.prepend(tab);
                tab.classList.remove("moving");
            }, 200);

            updateServices();
        });
    });

    packages.forEach(pkg => {
        pkg.addEventListener("click", () => {
            packages.forEach(p => p.classList.remove("active"));
            pkg.classList.add("active");
            activePackage = pkg.dataset.package;
            
            updateServices();
        });
    });

    updateServices();

});


/* ==================================================
MOBILE MENU
================================================== */

setTimeout(() => {

    const menuBtn = document.querySelector(".mobile-menu-btn");
    const mobileMenu = document.querySelector(".mobile-menu");

    if (!menuBtn || !mobileMenu) return;

    menuBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        mobileMenu.classList.toggle("active");
        menuBtn.classList.toggle("active");
    });

    document.addEventListener("click", (e) => {
        if (!mobileMenu.classList.contains("active")) return;

        if (
            !e.target.closest(".mobile-menu") &&
            !e.target.closest(".mobile-menu-btn")
        ) {
            mobileMenu.classList.remove("active");
            menuBtn.classList.remove("active");
        }
    });

}, 300);
// =================================================================
// 🟢 تشخیص خودکار و انیمیشن هوشمند متون طولانی (اصلاح شده برای فاکتور و تب سازمانی)
// =================================================================
function applyAutoSlidingText() {
    // 🟢 انتخاب تمام کلاس‌ها (سبز، زرد، سفید/سازمانی) و نام اقلام داخل فاکتور نهایی
    const targets = document.querySelectorAll(
        '[class*="-checkbox-label"], [class*="-checkbox-checked-label"], .invoice-item .item-name'
    );
    
    targets.forEach(target => {
        // ۱. ساخت یک کادر داخلی امن برای حرکت دادن متن به همراه آیکون
        let innerWrapper = target.querySelector('.scrolling-text-inner');
        if (!innerWrapper) {
            innerWrapper = document.createElement('div');
            innerWrapper.className = 'scrolling-text-inner';
            
            // انتقال امن تمام محتویات به داخل کادر متحرک
            while (target.firstChild) {
                innerWrapper.appendChild(target.firstChild);
            }
            target.appendChild(innerWrapper);
        }
        
        // ۲. پاک کردن انیمیشن‌های قبلی برای محاسبه دقیق
        innerWrapper.classList.remove('sliding-text');
        innerWrapper.style.removeProperty('--overflow-amount');
        
        // ۳. بررسی میزان بیرون‌زدگی
        if (innerWrapper.scrollWidth > target.clientWidth) {
            const overflowWidth = innerWrapper.scrollWidth - target.clientWidth;
            
            // ذخیره مقدار برای انیمیشن
            innerWrapper.style.setProperty('--overflow-amount', `${overflowWidth}px`);
            innerWrapper.classList.add('sliding-text');
        }
    });
}

window.addEventListener('load', applyAutoSlidingText);
window.addEventListener('resize', applyAutoSlidingText);
setTimeout(applyAutoSlidingText, 500);

document.querySelectorAll('.pricing-tab, .package-tab').forEach(tabButton => {
    tabButton.addEventListener('click', () => {
        setTimeout(applyAutoSlidingText, 100);
    });
});

// 🟢 اضافه شدن: اجرای انیمیشن به محض اضافه شدن سرویس جدید به فاکتور
const invoiceItemsList = document.getElementById('invoice-items-list');
if (invoiceItemsList) {
    const observer = new MutationObserver(() => {
        // وقتی ردیف جدیدی به فاکتور اضافه شد، انیمیشن را آپدیت کن
        setTimeout(applyAutoSlidingText, 50);
    });
    observer.observe(invoiceItemsList, { childList: true });
}
// =================================================================


});
</script>
