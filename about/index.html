                1391: { context: "مهاجرت", title: "حرکت به اروپا", text: "سال ۱۳۹۱ از ایران رفتم. آن موقع هنوز دقیق نمی‌دانستم قرار است چه مسیری جلویم باز شود، اما می‌دانستم این سفر فقط یک تجربه کوتاه نیست و احتمالاً قرار است چند سال از زندگی‌ام را شکل بدهد." },
                1392: { context: "رم، ایتالیا", title: "هنر، معماری و ساختار", text: "رم اولین شهری بود که در آن زندگی کردم. در دانشگاه جولیلمو مارکونی رشته IT خواندم، اما بخش زیادی از زمانم صرف کار می‌شد. تور لیدر بودم و تقریباً در سراسر ایتالیا کار می‌کردم. همین کار باعث شد شهرهای مختلف را ببینم و با آدم‌های زیادی آشنا شوم. رم برای من فقط محل زندگی نبود؛ شهری بود که هر خیابانش یک داستان داشت." },
                1394: { context: "کپنهاگ، دانمارک", title: "سرمای اسکاندیناوی", text: "چند ماهی هم در کپنهاگ زندگی کردم. هدفم این بود که کارهایم را جلو ببرم و بتوانم آنجا بمانم، اما در نهایت موفق نشدم اقامت بگیرم. تجربه ساده‌ای نبود، ولی همانجا فهمیدم گاهی برنامه‌ها دقیقاً آنطور که فکر می‌کنیم جلو نمی‌روند." },
                1395: { context: "آخن، آلمان", title: "نظم و دقت", text: "مدتی در آخن زندگی کردم. فضای آلمان برای من یک چیز را خیلی پررنگ نشان داد: نظم. در سبک زندگی مردم، در کار کردن، و حتی در جزئیات روزمره. همین تجربه بعدها در نگاه من به کار و پروژه‌ها تأثیر زیادی گذاشت." },
                1396: { context: "جنووا، ایتالیا", title: "رستوران ثریا", text: "در جنووا یک رستوران ایرانی به نام ثریا راه‌اندازی کردم. تجربه جذابی بود، اما در نهایت آنطور که باید پیش نرفت و بخش زیادی از سرمایه‌ام را از دست دادم. با این حال همان دوره چیزهایی یاد گرفتم که بعدها در مدیریت کار و تصمیم‌گیری‌ها خیلی به دردم خورد." },
                1397: { context: "بازگشت به ایران", title: "کنار خانواده", text: "بعد از رفتن پدرم تصمیم گرفتم به ایران برگردم تا کنار مادر باشم. گاهی بعضی تصمیم‌ها خیلی توضیح نمی‌خواهد. فقط می‌فهمی که وقتش رسیده مسیرت عوض شود." },
                1398: { context: "شروع سئو", title: "پروژه ثبت ارمغان", text: "سال ۱۳۹۸ یکی از دوستانم پیشنهادی داد که مسیر کاری من را کاملاً تغییر داد. گفت سایت و سئوی مجموعه‌شان را انجام بدهم. آن زمان حتی دقیق نمی‌دانستم سئو چیست، اما قبول کردم و شروع کردم یاد گرفتن. اسم پروژه «ثبت ارمغان» بود." },
                1399: { context: "یادگیری جدی", title: "کار هر روزه", text: "وقتی وارد سئو شدم، خیلی سریع درگیرش شدم. صبح تا شب کار می‌کردم و شب‌ها به کارهای فردا فکر می‌کردم. مدام مقاله می‌خواندم، تست می‌کردم، سایت‌ها را بررسی می‌کردم و اشتباه می‌کردم. همین روند کم‌کم تبدیل شد به مسیر اصلی کاری من." },
                1400: { context: "رشت، ایران", title: "دوران پاندمی", text: "وقتی کرونا شروع شد، ترجیح دادم مدتی از تهران دور باشم. رفتم رشت؛ شهری که همیشه برای من حال و هوای خاصی داشته. آب‌وهوا، فضای شهر و طبیعتش باعث شد آن دوره سخت را آرام‌تر بگذرانم و تمرکز بیشتری روی کارم داشته باشم." },
                1401: { context: "کار حرفه‌ای‌تر", title: "پروژه‌های بیشتر", text: "کم‌کم پروژه‌های بیشتری وارد کارم شد. هر سایت یک مسئله جدید بود؛ گاهی تحلیل، گاهی استراتژی محتوا، گاهی ساختار فنی. همین تنوع باعث شد سئو برای من تبدیل به کاری شود که همیشه چیزی برای یاد گرفتن دارد." },
                1402: { context: "مسیر کاری", title: "تمرکز روی رشد واقعی", text: "به مرور ترجیح دادم بیشتر با کسب‌وکارهایی کار کنم که دنبال رشد واقعی هستند، نه فقط چند تغییر کوتاه‌مدت در سایت. وقتی استراتژی درست اجرا شود، نتیجه خودش را نشان می‌دهد." },
                1405: { context: "تهران، ایران", title: "در زمان جنگ", text: "الان در تهران زندگی می‌کنم. با توجه به جنگی که این روزها بین آمریکا، اسرائیل و ایران جریان دارد و قطعی اینترنت، بسیاری از کارهای آنلاین فعلاً متوقف شده‌اند. از این وقفه ناخواسته استفاده کردم تا روی چیزی کار کنم که مدت‌ها در ذهنم بود؛ بازنویسی سایت شخصی‌ام و تبدیل آن از وردپرس به HTML خالص، تا ساختار ساده‌تر، سرعت بیشتر و کنترل کامل‌تری روی آن داشته باشم. این هم مثل خیلی از بخش‌های دیگر مسیر کاری من، تبدیل یک توقف ناگهانی به فرصتی برای ساختن چیزی جدید است." }
            };

            /* ---------------------------------------------------------------
            BUILD TIMELINE HTML
            --------------------------------------------------------------- */
            const container = document.getElementById("timeline-container");

            Object.keys(timelineData).forEach(year => {
                const data = timelineData[year];
                const block = document.createElement("div");
                block.className = "story-block";

                block.innerHTML = `
                    <div class="content-date">
                        <div class="step-year">${year}</div>
                    </div>
                    <div class="content-text">
                        <span class="step-context">${data.context || ""}</span>
                        <h2 class="step-title">${data.title}</h2>
                        <p class="step-text">${data.text}</p>
                    </div>
                `;

                container.appendChild(block);
            });

            /* ---------------------------------------------------------------
            SCROLL ANIMATION
            --------------------------------------------------------------- */
            const storyBlocks = document.querySelectorAll(".story-block");

            function updateScrollAnimation() {
                const windowCenter = window.innerHeight / 2;
                const maxDistance = window.innerHeight / 2;

                storyBlocks.forEach(block => {
                    const rect = block.getBoundingClientRect();
                    const blockCenter = rect.top + (rect.height / 2);
                    const distanceFromCenter = Math.abs(windowCenter - blockCenter);

                    let progress = 1 - (distanceFromCenter / maxDistance);
                    progress = Math.max(0, Math.min(1, progress));

                    const textContent = block.querySelector(".content-text");
                    if (textContent) {
                        textContent.style.setProperty("--progress", progress);
                    }

                    const dateElement = block.querySelector(".step-year");
                    if (dateElement) {
                        dateElement.style.setProperty("--progress", progress);
                        const scrollOffset = (windowCenter - blockCenter) * 1.5;
                        dateElement.style.setProperty("--date-scroll-offset", `${scrollOffset}px`);
                    }

                    if (progress > 0.85) {
                        block.classList.add("active");
                    } else {
                        block.classList.remove("active");
                    }
                });
            }

            /* ---------------------------------------------------------------
            SCROLL PERFORMANCE (rAF THROTTLE)
            --------------------------------------------------------------- */
            let isScrolling = false;

            window.addEventListener("scroll", () => {
                if (!isScrolling) {
                    window.requestAnimationFrame(() => {
                        updateScrollAnimation();
                        isScrolling = false;
                    });
                    isScrolling = true;
                }
            });

            /* ---------------------------------------------------------------
            INITIAL STATE
            --------------------------------------------------------------- */
            updateScrollAnimation();

            /* ---------------------------------------------------------------
            BREADCRUMB TYPING ANIMATION
            --------------------------------------------------------------- */
            const terminalPath = document.getElementById("terminalPath");
            const domain = window.location.hostname;
            const pathParts = window.location.pathname.split("/").filter(Boolean);

            const paths = [];
            let fullPath = "";

            paths.push({ name: domain, url: "/" });

            pathParts.forEach(part => {
                fullPath += "/" + part;
                paths.push({ name: part, url: fullPath });
            });

            let textIndex = 0;
            let charIndex = 0;

            function typeSegment() {
                if (textIndex >= paths.length) return;

                const segment = paths[textIndex];
                const link = document.createElement("a");
                link.href = segment.url;
                terminalPath.appendChild(link);

                function typeChar() {
                    if (charIndex < segment.name.length) {
                        link.textContent += segment.name.charAt(charIndex);
                        charIndex++;
                        setTimeout(typeChar, 40);
                    } else {
                        charIndex = 0;
                        textIndex++;

                        if (textIndex < paths.length) {
                            terminalPath.appendChild(document.createTextNode("/"));
                        }

                        setTimeout(typeSegment, 100);
                    }
                }

                typeChar();
            }

            typeSegment();
        });
    </script>
