    <script>
    document.addEventListener("DOMContentLoaded", function () {

        /* ======================================================================
           TIMELINE DATA
           ====================================================================== */

        const timelineData = {
            1989: {
                context: "Kasra Hastanesi",
                title: "Hayatımın Başlangıcı",
                text: "Ben 21 Mart 1989 tarihinde İran'ın Tahran şehrinde doğdum. O yıllarda hayatımın bilgisayarlar ve internet etrafında şekilleneceğini bilmem mümkün değildi. Sıradan bir çocuktum. Ama birkaç yıl sonra, bir klavyenin başında saatlerce oturup tuşların ardındaki dünyayı merak eden birine dönüşecektim."
            },
            2003: {
                context: "İlk Bilgisayarım",
                title: "Merak Ciddileşiyor",
                text: "Ortaokuldayken, 14 yaşımda ilk bilgisayarımı aldım. Çoğu insan için sıradan bir aletti; benim içinse bambaşka bir kapıydı. Kurcalamaya başladım, denedim, bozdum, tekrar denedim. Ekranın arkasında nasıl bir dünya olduğunu anlamaya çalışıyordum."
            },
            2012: {
                context: "Göç",
                title: "Avrupa'ya Doğru",
                text: "İran'dan 2012'de ayrıldım. O günlerde önümde nasıl bir yol açılacağını net olarak bilmiyordum. Bildiğim tek şey, bunun kısa süreli bir deneyim olmayacağı ve hayatımın önemli bir bölümünü etkileyeceğiydi."
            },
            2013: {
                context: "Roma, İtalya",
                title: "Sanat, Mimari ve Disiplin",
                text: "Roma'da yaşamaya başladım. Guglielmo Marconi Üniversitesi'nde IT okudum ama zamanımın büyük kısmı çalışarak geçiyordu. Tur rehberliği yaptım; neredeyse tüm İtalya'yı dolaştım. Farklı şehirler, farklı insanlar… Roma benim için sadece yaşadığım yer değil, her köşesi ayrı bir hikâye anlatan bir şehirdi."
            },
            2015: {
                context: "Kopenhag, Danimarka",
                title: "İskandinav Soğuğu",
                text: "Kopenhag'da birkaç ay yaşadım. Amacım orada kalıcı olabilmekti. Olmadı. Oturum izni alamadım. Zor bir dönemdi ama bana şunu öğretti: Her plan, her zaman planladığımız gibi ilerlemiyor."
            },
            2016: {
                context: "Aachen, Almanya",
                title: "Düzen ve Detay",
                text: "Bir süre Aachen'da yaşadım. Almanya bana tek bir şeyi çok net gösterdi: düzen. Günlük yaşamda, iş yapış şeklinde, en küçük detaylarda bile. Bu bakış açısı, yıllar sonra bile iş yaklaşımımı etkilemeye devam etti."
            },
            2017: {
                context: "Cenova, İtalya",
                title: "Suraya Restoranı",
                text: "Cenova'da Suraya adında bir İran restoranı açtım. Keyifli ama zorlu bir deneyimdi. Ne yazık ki işler istediğim gibi gitmedi ve ciddi bir maddi kayıp yaşadım. Yine de o dönem öğrendiklerim, sonraki yıllarda iş yönetiminde bana fazlasıyla katkı sağladı."
            },
            2018: {
                context: "İran'a Dönüş",
                title: "Ailenin Yanında",
                text: "Babamı kaybettikten sonra annemin yanında olmak için İran'a dönmeye karar verdim. Bazı kararlar uzun uzun açıklanmaz. Sadece doğru zamanın geldiğini hissedersiniz."
            },
            2019: {
                context: "SEO ile Tanışma",
                title: "Armağan Tescil Projesi",
                text: "2019'da bir arkadaşım bana bir teklif sundu. Web siteleri ve SEO süreçleriyle ilgilenmemi istedi. O günlerde SEO'nun ne olduğunu bile tam olarak bilmiyordum. Ama kabul ettim. Öğrenmeye başladım. Projenin adı Zabt Armaghan'dı."
            },
            2020: {
                context: "Yoğun Öğrenme Süreci",
                title: "Her Gün Aynı Tempo",
                text: "SEO'ya girdikten sonra işin içine tamamen çekildim. Sabah çalışıyor, akşam çalışıyor, gece ertesi günü düşünüyordum. Sürekli okuyordum, deniyordum, analiz yapıyordum. Hatalar da oldu. Zamanla bu süreç ana mesleğim haline geldi."
            },
            2021: {
                context: "Reşt, İran",
                title: "Pandemi Günleri",
                text: "Pandemi başladığında Tahran'dan bir süre uzaklaştım ve Reşt'e gittim. Şehrin havası, doğası ve sakinliği o zorlu dönemi daha dengeli geçirmemi sağladı. Aynı zamanda işime daha iyi odaklandım."
            },
            2022: {
                context: "Daha Fazla Proje",
                title: "Profesyonel Dönem",
                text: "Zamanla daha fazla SEO ve web tasarım projesi gelmeye başladı. Her site farklı bir problemdi. Kimi zaman analiz, kimi zaman içerik stratejisi, kimi zaman teknik yapı. Bu çeşitlilik, işi benim için hâlâ canlı tutuyor."
            },
            2023: {
                context: "Kariyer Odağı",
                title: "Gerçek Büyüme",
                text: "Kısa vadeli sonuçlar yerine, sürdürülebilir büyümeyi hedefleyen markalarla çalışmayı tercih etmeye başladım. Doğru strateji uygulandığında, sonuçlar zaten kendini gösteriyor."
            },
            2026: {
                context: "Tahran, İran",
                title: "Zor Zamanlarda",
                text: "Şu anda Tahran'da yaşıyorum. Bölgedeki çatışmalar ve internet kesintileri birçok online işi durma noktasına getirdi. Ben de bu beklenmedik arayı, uzun süredir aklımda olan bir şeye ayırdım: Kişisel sitemi sıfırdan yeniden yazmak. WordPress'ten çıkarak saf HTML'e geçtim. Daha sade, daha hızlı ve tamamen kontrol edilebilir bir yapı kurmak istedim. Benim için bu da, beklenmedik bir duraksamayı üretken bir fırsata çevirmenin bir yolu oldu."
            }
        };

        /* ======================================================================
           BUILD TIMELINE HTML
           ====================================================================== */

        const timelineContainer = document.getElementById("timeline-container");

        Object.keys(timelineData).forEach(function (year) {
            const data = timelineData[year];
            const block = document.createElement("div");
            block.className = "story-block";

            block.innerHTML =
                '<div class="content-date">' +
                    '<div class="step-year">' + year + '</div>' +
                '</div>' +
                '<div class="content-text">' +
                    '<span class="step-context">' + (data.context || "") + '</span>' +
                    '<h2 class="step-title">' + data.title + '</h2>' +
                    '<p class="step-text">' + data.text + '</p>' +
                '</div>';

            timelineContainer.appendChild(block);
        });

        /* ======================================================================
           SCROLL ANIMATION — TIMELINE
           ====================================================================== */

        const storyBlocks = document.querySelectorAll(".story-block");

        function updateScrollAnimation() {
            const windowCenter = window.innerHeight / 2;
            const maxDistance = window.innerHeight / 2;

            storyBlocks.forEach(function (block) {
                const rect = block.getBoundingClientRect();
                const blockCenter = rect.top + (rect.height / 2);
                const distanceFromCenter = Math.abs(windowCenter - blockCenter);

                let progress = 1 - (distanceFromCenter / maxDistance);
                progress = Math.max(0, Math.min(1, progress));

                const textContent = block.querySelector(".content-text");
                if (textContent) {
                    textContent.style.setProperty("--progress", progress);
                }

                const dateElement = block.querySelector(".step-year");
                if (dateElement) {
                    dateElement.style.setProperty("--progress", progress);
                    const scrollOffset = (windowCenter - blockCenter) * 1.5;
                    dateElement.style.setProperty("--date-scroll-offset", scrollOffset + "px");
                }

                if (progress > 0.85) {
                    block.classList.add("active");
                } else {
                    block.classList.remove("active");
                }
            });
        }

        /* Scroll performance: throttle with requestAnimationFrame */
        let isScrolling = false;

        window.addEventListener("scroll", function () {
            if (!isScrolling) {
                window.requestAnimationFrame(function () {
                    updateScrollAnimation();
                    isScrolling = false;
                });
                isScrolling = true;
            }
        });

        /* Initialize animation state */
        updateScrollAnimation();

        /* ======================================================================
           BREADCRUMB TYPING ANIMATION
           ====================================================================== */

        const terminalPath = document.getElementById("terminalPath");
        const domain = window.location.hostname;
        const pathParts = window.location.pathname.split("/").filter(Boolean);

        const paths = [];
        let fullPath = "";

        paths.push({
            name: domain,
            url: "/"
        });

        pathParts.forEach(function (part) {
            fullPath += "/" + part;
            paths.push({
                name: part,
                url: fullPath
            });
        });

        let textIndex = 0;
        let charIndex = 0;

        function typeSegment() {
            if (textIndex >= paths.length) return;

            const segment = paths[textIndex];
            const link = document.createElement("a");
            link.href = segment.url;
            terminalPath.appendChild(link);

            function typeChar() {
                if (charIndex < segment.name.length) {
                    link.textContent += segment.name.charAt(charIndex);
                    charIndex++;
                    setTimeout(typeChar, 40);
                } else {
                    charIndex = 0;
                    textIndex++;

                    if (textIndex < paths.length) {
                        terminalPath.appendChild(document.createTextNode("/"));
                    }

                    setTimeout(typeSegment, 100);
                }
            }

            typeChar();
        }

        typeSegment();

    });
    </script>
