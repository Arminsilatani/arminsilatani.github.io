        1409: { context: "مستشفى كسری", title: "البداية", text: "وُلدتُ في 14 شعبان 1409 في طهران، إيران. في ذلك الوقت لم أكن أعرف طبعاً أن الحاسوب والإنترنت سيصبحان جزءاً كبيراً من حياتي. كنت مجرد طفل عادي، لكن بعد سنوات قليلة وجدت نفسي أجلس أمام لوحة المفاتيح لساعات، أتأمل أزرارها وأحاول فهم العالم الذي يقف خلف الشاشة." },
        1424: { context: "أول حاسوب", title: "بداية الفضول الحقيقي", text: "في السنة الثانية من المرحلة المتوسطة، عندما كان عمري أربعة عشر عاماً، اشتريت أول حاسوب لي. بالنسبة لكثيرين كان مجرد جهاز عادي، لكن بالنسبة لي كان شيئاً مختلفاً. بدأت أستخدمه باستمرار، أجرب أشياء جديدة، وأكتشف شيئاً فشيئاً ما الذي يوجد خلف هذه الشاشة." },
        1433: { context: "الهجرة", title: "الانتقال إلى أوروبا", text: "في عام 1433 غادرت إيران. لم أكن أعرف تماماً ما الذي ينتظرني، لكنني كنت متأكداً أن هذه الرحلة لن تكون مجرد تجربة قصيرة، بل مرحلة قد تشكّل سنوات من حياتي." },
        1434: { context: "روما – إيطاليا", title: "الفن والعمارة", text: "كانت روما أول مدينة أعيش فيها. درست تقنية المعلومات في جامعة غولييلمو ماركوني، لكن جزءاً كبيراً من وقتي كان يذهب للعمل. عملت مرشداً سياحياً وتنقلت بين مدن كثيرة في إيطاليا. هذا العمل أتاح لي رؤية أماكن مختلفة والتعرف على أشخاص كثر. بالنسبة لي، لم تكن روما مجرد مدينة للسكن؛ بل مدينة يحمل كل شارع فيها قصة." },
        1436: { context: "كوبنهاغن – الدنمارك", title: "برد الشمال", text: "عشت عدة أشهر في كوبنهاغن. كان هدفي تطوير عملي والبقاء هناك، لكنني في النهاية لم أتمكن من الحصول على الإقامة. لم تكن تجربة سهلة، لكنها جعلتني أفهم أن الخطط لا تسير دائماً كما نتوقع." },
        1437: { context: "آخن – ألمانيا", title: "النظام والدقة", text: "عشت فترة في مدينة آخن. أكثر ما لفت انتباهي في ألمانيا كان النظام؛ في حياة الناس اليومية، في طريقة العمل، وحتى في التفاصيل الصغيرة. هذه التجربة أثرت لاحقاً في نظرتي للعمل وإدارة المشاريع." },
        1438: { context: "جنوة – إيطاليا", title: "مطعم «ثريا»", text: "في جنوة افتتحت مطعماً إيرانياً باسم «ثريا». كانت تجربة مثيرة، لكنها في النهاية لم تسر كما كنت آمل، وخسرت جزءاً كبيراً من رأس المال. رغم ذلك، تعلمت خلال تلك الفترة دروساً مهمة في الإدارة واتخاذ القرار، وما زلت أستفيد منها حتى اليوم." },
        1439: { context: "العودة إلى إيران", title: "قرب العائلة", text: "بعد وفاة والدي قررت العودة إلى إيران لأكون بجانب والدتي. بعض القرارات لا تحتاج إلى شرح طويل؛ ببساطة تدرك أن الوقت قد حان لتغيير الطريق." },
        1440: { context: "بداية العمل في SEO", title: "مشروع تسجيل أرمغان", text: "في عام 1440 اقترح عليّ أحد الأصدقاء فكرة غيّرت مساري المهني بالكامل. طلب مني إدارة موقع شركتهم والعمل على تحسين ظهوره في محركات البحث. في ذلك الوقت لم أكن أعرف الكثير عن السيو، لكنني وافقت وبدأت أتعلم. كان اسم المشروع تسجيل ارمغان." },
        1441: { context: "مرحلة التعلم الجاد", title: "عمل يومي مستمر", text: "عندما دخلت عالم SEO، انجذبت إليه بسرعة. كنت أعمل من الصباح حتى الليل، وأفكر في مهام اليوم التالي قبل النوم. أقرأ مقالات، أجرب، أراجع المواقع، وأخطئ كثيراً. ومع الوقت أصبح هذا المجال هو مساري المهني الرئيسي." },
        1442: { context: "رشت – إيران", title: "فترة الجائحة", text: "عندما بدأت جائحة كورونا فضّلت الابتعاد قليلاً عن طهران. انتقلت إلى رشت، وهي مدينة لها دائماً طابع خاص بالنسبة لي. الطقس والطبيعة والهدوء هناك ساعدوني على تجاوز تلك الفترة الصعبة والعمل بتركيز أكبر." },
        1443: { context: "العمل بشكل أكثر احترافية", title: "مشاريع أكثر", text: "مع الوقت بدأت المشاريع تزداد. كل موقع كان يحمل تحدياً مختلفاً؛ أحياناً في التحليل، وأحياناً في استراتيجية المحتوى، وأحياناً في البنية التقنية. هذا التنوع جعل العمل في السيو مجالاً يتطلب تعلماً مستمراً." },
        1444: { context: "المسار المهني", title: "التركيز على النمو الحقيقي", text: "مع مرور الوقت فضّلت العمل مع شركات تبحث عن نمو حقيقي، لا مجرد تغييرات مؤقتة في الموقع. عندما تُبنى الاستراتيجية بشكل صحيح، تظهر النتائج من تلقاء نفسها." },
        1447: { context: "طهران – إيران", title: "خلال فترة الحرب", text: "أعيش حالياً في طهران. ومع الظروف الحالية والحرب الدائرة بين الولايات المتحدة وإسرائيل وإيران، إضافة إلى انقطاعات الإنترنت، توقفت كثير من الأعمال الرقمية مؤقتاً. استغليت هذا التوقف لأعمل على فكرة كانت تراودني منذ مدة: إعادة كتابة موقعي الشخصي وتحويله من ووردبريس إلى HTML خالص، حتى أحصل على بنية أبسط وسرعة أعلى وتحكم كامل بالموقع. مثل كثير من محطات حياتي، تحوّل هذا التوقف المفاجئ إلى فرصة لبناء شيء جديد." }
      };

      /* ------------------------------------------------------------------
         BUILD TIMELINE HTML
      --------------------------------------------------------------------- */
      const container = document.getElementById("timeline-container");

      Object.keys(timelineData).forEach(year => {
        const data = timelineData[year];
        const block = document.createElement("div");
        block.className = "story-block";

        block.innerHTML = `
          <div class="content-date">
            <div class="step-year">${year}</div>
          </div>
          <div class="content-text">
            <span class="step-context">${data.context || ""}</span>
            <h2 class="step-title">${data.title}</h2>
            <p class="step-text">${data.text}</p>
          </div>
        `;

        container.appendChild(block);
      });

      /* ------------------------------------------------------------------
         SCROLL ANIMATION
      --------------------------------------------------------------------- */
      const storyBlocks = document.querySelectorAll(".story-block");

      function updateScrollAnimation() {
        const windowCenter = window.innerHeight / 2;
        const maxDistance = window.innerHeight / 2;

        storyBlocks.forEach(block => {
          const rect = block.getBoundingClientRect();
          const blockCenter = rect.top + (rect.height / 2);
          const distanceFromCenter = Math.abs(windowCenter - blockCenter);

          let progress = 1 - (distanceFromCenter / maxDistance);
          progress = Math.max(0, Math.min(1, progress));

          const textContent = block.querySelector(".content-text");
          if (textContent) {
            textContent.style.setProperty("--progress", progress);
          }

          const dateElement = block.querySelector(".step-year");
          if (dateElement) {
            dateElement.style.setProperty("--progress", progress);
            const scrollOffset = (windowCenter - blockCenter) * 1.5;
            dateElement.style.setProperty("--date-scroll-offset", `${scrollOffset}px`);
          }

          if (progress > 0.85) {
            block.classList.add("active");
          } else {
            block.classList.remove("active");
          }
        });
      }

      /* ------------------------------------------------------------------
         SCROLL PERFORMANCE OPTIMIZATION
      --------------------------------------------------------------------- */
      let isScrolling = false;

      window.addEventListener("scroll", () => {
        if (!isScrolling) {
          window.requestAnimationFrame(() => {
            updateScrollAnimation();
            isScrolling = false;
          });
          isScrolling = true;
        }
      });

      /* ------------------------------------------------------------------
         INITIAL STATE
      --------------------------------------------------------------------- */
      updateScrollAnimation();
    });
  </script>

  <!-- ------------------------- BREADCRUMB SCRIPT ------------------------- -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const container = document.getElementById("terminalPath");
      const domain = window.location.hostname;
      const parts = window.location.pathname.split("/").filter(Boolean);

      let paths = [];
      let fullPath = "";

      paths.push({
        name: domain,
        url: "/"
      });

      parts.forEach(part => {
        fullPath += "/" + part;
        paths.push({
          name: part,
          url: fullPath
        });
      });

      let textIndex = 0;
      let charIndex = 0;

      function typeSegment() {
        if (textIndex >= paths.length) return;

        let segment = paths[textIndex];
        let link = document.createElement("a");
        link.href = segment.url;
        container.appendChild(link);

        function typeChar() {
          if (charIndex < segment.name.length) {
            link.textContent += segment.name.charAt(charIndex);
            charIndex++;
            setTimeout(typeChar, 40);
          } else {
            charIndex = 0;
            textIndex++;
            if (textIndex < paths.length) {
              container.appendChild(document.createTextNode("/"));
            }
            setTimeout(typeSegment, 100);
          }
        }

        typeChar();
      }

      typeSegment();
    });
  </script>
