    <script>
        document.addEventListener("DOMContentLoaded", function () {

            /* ==================================================================
               TIMELINE DATA
               ================================================================== */

            const timelineData = {

                1989: {
                    context: "Ospedale Kasra",
                    title: "L'inizio",
                    text: "Sono nato il 21 marzo 1989 all'Ospedale Kasra a Teheran, in Iran. All'epoca ovviamente non potevo immaginare che gran parte della mia vita sarebbe stata legata ai computer e a Internet. Ero solo un bambino come tanti. Qualche anno dopo però mi sarei ritrovato davanti a una tastiera, a fissare quei tasti e a chiedermi per ore che tipo di mondo si nascondesse dietro uno schermo."
                },

                2003: {
                    context: "Il primo computer",
                    title: "La curiosità diventa seria",
                    text: "Al secondo anno delle scuole medie, quando avevo 14 anni, comprai il mio primo computer. Per molti era semplicemente un dispositivo come tanti altri. Per me invece era qualcosa di diverso. Iniziai a usarlo ogni giorno, a sperimentare, a provare cose nuove e soprattutto a capire che dietro quello schermo esisteva un mondo molto più grande di quanto immaginassi."
                },

                2012: {
                    context: "Migrazione",
                    title: "Verso l'Europa",
                    text: "Nel 2012 lasciai l'Iran. Non sapevo ancora quale strada mi avrebbe aspettato, ma avevo la sensazione che quel viaggio non sarebbe stato solo un'esperienza temporanea. In qualche modo avrebbe segnato diversi anni della mia vita."
                },

                2013: {
                    context: "Roma, Italia",
                    title: "Arte, architettura e struttura",
                    text: "La prima città in cui ho vissuto è stata Roma. Studiavo IT all'Università Guglielmo Marconi, ma gran parte del mio tempo era dedicata al lavoro. Facevo la guida turistica e mi spostavo spesso in tutta Italia. Grazie a quel lavoro ho visto molte città e conosciuto persone molto diverse tra loro. Per me Roma non era solo un posto dove vivere: era una città in cui ogni strada sembrava avere una storia da raccontare."
                },

                2015: {
                    context: "Copenaghen, Danimarca",
                    title: "Il freddo del nord",
                    text: "Per alcuni mesi ho vissuto anche a Copenaghen. L'obiettivo era sistemare le mie cose e riuscire a ottenere un permesso di soggiorno. Alla fine però non è andata così. Non è stata un'esperienza facile, ma proprio lì ho capito una cosa importante: i piani non sempre seguono la direzione che immaginiamo."
                },

                2016: {
                    context: "Aachen, Germania",
                    title: "Ordine e precisione",
                    text: "Per un periodo ho vissuto ad Aachen. L'esperienza in Germania mi ha fatto notare soprattutto una cosa: l'ordine. Lo si vede nello stile di vita, nel modo di lavorare e perfino nei piccoli dettagli quotidiani. Col tempo questa esperienza ha influenzato molto il mio modo di guardare al lavoro e ai progetti."
                },

                2017: {
                    context: "Genova, Italia",
                    title: "Il ristorante Soraya",
                    text: "A Genova ho aperto un ristorante iraniano chiamato Soraya. È stata un'esperienza intensa e piena di entusiasmo. Alla fine però le cose non sono andate come speravo e ho perso una parte importante del capitale investito. Nonostante questo, quel periodo mi ha insegnato molto sulla gestione del lavoro e sulle decisioni imprenditoriali."
                },

                2018: {
                    context: "Ritorno in Iran",
                    title: "Vicino alla famiglia",
                    text: "Dopo la morte di mio padre ho deciso di tornare in Iran per stare vicino a mia madre. Alcune decisioni non hanno bisogno di molte spiegazioni. A volte capisci semplicemente che è arrivato il momento di cambiare direzione."
                },

                2019: {
                    context: "Inizio della SEO",
                    title: "Il Progetto Armaghan Registrazioni",
                    text: "Nel 2019 un amico mi fece una proposta che avrebbe cambiato completamente il mio percorso professionale: occuparmi del sito web e della SEO della loro azienda. A dire il vero non sapevo nemmeno bene cosa fosse la SEO. Ho accettato comunque e ho iniziato a studiare. Il progetto si chiamava Armaghan Registrazioni."
                },

                2020: {
                    context: "Studio intenso",
                    title: "Lavoro quotidiano",
                    text: "Quando sono entrato nel mondo della SEO, mi ha subito preso completamente. Lavoravo dalla mattina alla sera e spesso la notte pensavo già a cosa fare il giorno dopo. Leggevo articoli, facevo test, analizzavo siti web e naturalmente commettevo errori. Con il tempo però proprio questa routine è diventata il mio vero percorso professionale."
                },

                2021: {
                    context: "Rasht, Iran",
                    title: "Il periodo della pandemia",
                    text: "Quando è iniziata la pandemia ho preferito allontanarmi per un po' da Teheran. Mi sono trasferito a Rasht, una città che per me ha sempre avuto un'atmosfera particolare. Il clima, la natura e la tranquillità del posto mi hanno aiutato ad affrontare quel periodo difficile con più calma e con maggiore concentrazione sul lavoro."
                },

                2022: {
                    context: "Crescita professionale",
                    title: "Più progetti",
                    text: "Con il tempo sono arrivati sempre più progetti. Ogni sito web portava con sé una sfida diversa: analisi SEO, strategia dei contenuti oppure struttura tecnica. Proprio questa varietà ha reso il mio lavoro interessante, perché nella SEO c'è sempre qualcosa di nuovo da imparare."
                },

                2023: {
                    context: "Percorso professionale",
                    title: "Puntare sulla crescita reale",
                    text: "Col tempo ho iniziato a preferire collaborazioni con aziende che cercano una crescita reale online, non solo piccoli cambiamenti temporanei sul sito. Quando una strategia SEO è costruita bene e applicata con costanza, i risultati arrivano in modo naturale."
                },

                2026: {
                    context: "Teheran, Iran",
                    title: "Durante la guerra",
                    text: "Oggi vivo a Teheran. A causa della guerra in corso tra Stati Uniti, Israele e Iran e delle frequenti interruzioni di Internet, molti lavori online sono temporaneamente fermi. Ho deciso di usare questa pausa forzata per dedicarmi a un progetto che avevo in mente da tempo: riscrivere completamente il mio sito personale e trasformarlo da WordPress a HTML puro. In questo modo posso avere una struttura più semplice, maggiore velocità e un controllo totale sul sito. Anche questa volta, come spesso è successo nel mio percorso, una pausa improvvisa si è trasformata nell'occasione per costruire qualcosa di nuovo."
                }

            };


            /* ==================================================================
               BUILD TIMELINE HTML
               ================================================================== */

            const container = document.getElementById("timeline-container");

            Object.keys(timelineData).forEach(function (year) {

                const data = timelineData[year];

                const block = document.createElement("div");
                block.className = "story-block";

                block.innerHTML =
                    '<div class="content-date">' +
                        '<div class="step-year">' + year + '</div>' +
                    '</div>' +
                    '<div class="content-text">' +
                        '<span class="step-context">' + (data.context || "") + '</span>' +
                        '<h2 class="step-title">' + data.title + '</h2>' +
                        '<p class="step-text">' + data.text + '</p>' +
                    '</div>';

                container.appendChild(block);

            });


            /* ==================================================================
               SCROLL ANIMATION
               ================================================================== */

            const storyBlocks = document.querySelectorAll(".story-block");

            function updateScrollAnimation() {

                const windowCenter = window.innerHeight / 2;
                const maxDistance = window.innerHeight / 2;

                storyBlocks.forEach(function (block) {

                    const rect = block.getBoundingClientRect();
                    const blockCenter = rect.top + (rect.height / 2);
                    const distanceFromCenter = Math.abs(windowCenter - blockCenter);

                    let progress = 1 - (distanceFromCenter / maxDistance);
                    progress = Math.max(0, Math.min(1, progress));

                    const textContent = block.querySelector(".content-text");
                    if (textContent) {
                        textContent.style.setProperty("--progress", progress);
                    }

                    const dateElement = block.querySelector(".step-year");
                    if (dateElement) {

                        dateElement.style.setProperty("--progress", progress);

                        const scrollOffset = (windowCenter - blockCenter) * 1.5;
                        dateElement.style.setProperty("--date-scroll-offset", scrollOffset + "px");
                    }

                    if (progress > 0.85) {
                        block.classList.add("active");
                    } else {
                        block.classList.remove("active");
                    }

                });

            }


            /* ==================================================================
               SCROLL PERFORMANCE OPTIMIZATION
               ================================================================== */

            let isScrolling = false;

            window.addEventListener("scroll", function () {

                if (!isScrolling) {

                    window.requestAnimationFrame(function () {
                        updateScrollAnimation();
                        isScrolling = false;
                    });

                    isScrolling = true;
                }

            });


            /* ==================================================================
               INITIAL STATE
               ================================================================== */

            updateScrollAnimation();


            /* ==================================================================
               BREADCRUMB TERMINAL TYPING ANIMATION
               ================================================================== */

            const terminalContainer = document.getElementById("terminalPath");

            const domain = window.location.hostname;

            const pathParts = window.location.pathname.split("/").filter(Boolean);

            const paths = [];
            let fullPath = "";

            paths.push({
                name: domain,
                url: "/"
            });

            pathParts.forEach(function (part) {
                fullPath += "/" + part;

                paths.push({
                    name: part,
                    url: fullPath
                });
            });

            let textIndex = 0;
            let charIndex = 0;

            function typeSegment() {

                if (textIndex >= paths.length) {
                    return;
                }

                const segment = paths[textIndex];

                const link = document.createElement("a");
                link.href = segment.url;

                terminalContainer.appendChild(link);

                function typeChar() {

                    if (charIndex < segment.name.length) {

                        link.textContent += segment.name.charAt(charIndex);
                        charIndex++;

                        setTimeout(typeChar, 40);

                    } else {

                        charIndex = 0;
                        textIndex++;

                        if (textIndex < paths.length) {
                            terminalContainer.appendChild(document.createTextNode("/"));
                        }

                        setTimeout(typeSegment, 100);
                    }

                }

                typeChar();

            }

            typeSegment();

        });
    </script>
